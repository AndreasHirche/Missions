<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Missions KG — VR</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#06070f;overflow:hidden;font-family:'Inter',system-ui,sans-serif;height:100vh}
canvas{display:block}
#vr-btn-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:10}
#info{position:fixed;top:16px;left:50%;transform:translateX(-50%);
  background:rgba(6,7,15,0.9);border:1px solid #1e293b;border-radius:10px;
  padding:8px 18px;color:#e2e8f0;font-size:0.8rem;text-align:center;z-index:10;backdrop-filter:blur(8px)}
#info a{color:#60a5fa;text-decoration:none}
#loading{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;background:#06070f;z-index:20;gap:16px;color:#e2e8f0}
.spinner{width:36px;height:36px;border:3px solid #1e293b;border-top-color:#7c3aed;
  border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="info">Missions Knowledge Graph — VR &nbsp;|&nbsp;<a href="index.html">← Back</a></div>
<div id="vr-btn-wrap"></div>
<div id="loading"><div class="spinner"></div><div>Loading graph data…</div></div>

<script src="three.min.js"></script>
<script src="3d-force-graph.min.js"></script>
<script>
var KG_COLORS={mission:'#fde047',category:'#d1d5db',coach:'#e879f9',tag:'#fbbf24',
  company:'#166534',focus:'#f97316',service:'#60a5fa',svcopt:'#60a5fa',svcpartner:'#a3e635'};
var MOVE_SPEED=1.5, TURN_SPEED=0.025, DEADZONE=0.15;

// ── State ──────────────────────────────────────────────────────────────────────
var vis={mission:1,coach:1,company:1,focus:1,service:1,tag:0};
var filterCat='';
var allNodes=[], allLinks=[], graphInst=null;

var UC_SERVICES={}, UC_DC_IDS={}, UC_DETAILS={};
Promise.all([
  fetch('uc_services.json').then(function(r){return r.ok?r.json():{};}).catch(function(){return {};}),
  fetch('uc_dc_ids.json').then(function(r){return r.ok?r.json():{};}).catch(function(){return {};}),
  fetch('uc_details.json').then(function(r){return r.ok?r.json():{};}).catch(function(){return {};})
]).then(function(results){
  UC_SERVICES=results[0]; UC_DC_IDS=results[1]; UC_DETAILS=results[2];
  document.getElementById('loading').innerHTML='<div class="spinner"></div><div>Building graph…</div>';
  setTimeout(buildGraph,100);
});

function buildGraph(){
  var missions=(window.opener&&window.opener.allMissions)||[];
  if(!missions.length){buildFromDetails();return;}
  var CAT_NORM={'database and data management':'DB & Data Mgmt','application development and automation':'App Dev & Auto','digital process automation':'Digital Process Auto','data and analytics':'Data & Analytics','integration suite':'Integration Suite','inegration suite':'Integration Suite','generative ai':'Generative AI','artificial intelligence':'AI','ai core':'AI'};
  function nc(c){return CAT_NORM[(c||'').toLowerCase()]||c;}
  function getDcId(m){
    var u=String(m['UCR ID']||'');
    if(UC_DC_IDS[u])return UC_DC_IDS[u];
    var mm=String(m['Link to Discovery Center']||'').match(/missiondetail\/(\d+)/);
    return mm?mm[1]:null;
  }
  var nodes={},links=[];
  function node(id,label,type,extra){if(!nodes[id])nodes[id]={id:id,label:label,type:type,count:0,...(extra||{})};return nodes[id];}
  missions.forEach(function(m){
    var mid='m:'+m['UCR ID'];
    node(mid,m['Mission Name']||m['UCR ID'],'mission',{status:(m['STATUS']||'').toLowerCase(),company:(m['Authoring Company']||'').trim()});
    var cat=nc((m['Category']||'Other').trim());
    node('cat:'+cat,cat,'category').count++;
    links.push({source:mid,target:'cat:'+cat,rel:'category'});
    var coach=(m['Coach name(s)']||'').trim();
    if(coach){node('coach:'+coach,coach,'coach').count++;links.push({source:mid,target:'coach:'+coach,rel:'coach'});}
    var company=(m['Authoring Company']||'').trim();
    if(company){node('co:'+company,company,'company').count++;links.push({source:mid,target:'co:'+company,rel:'company'});}
    var det=UC_DETAILS[m['UCR ID']||'']||{};
    (det.focusTopics||[]).forEach(function(ft){if(!ft)return;node('ft:'+ft,ft,'focus').count++;links.push({source:mid,target:'ft:'+ft,rel:'focus'});});
    var dcId=getDcId(m);
    (dcId?UC_SERVICES[dcId]||[]:[]).forEach(function(s){
      var name=typeof s==='string'?s:s.n;
      var cl=(typeof s==='string'?'':s.c||'').toLowerCase();
      var opt=typeof s==='string'?false:!!s.o;
      var nt=opt?'svcopt':(cl.includes('partner')||cl.includes('successfactor')||cl.includes('amazon')||cl.includes('azure')||cl.includes('google')?'svcpartner':'service');
      if(!name)return;
      node('svc:'+name,name,nt).count++;links.push({source:mid,target:'svc:'+name,rel:'service'});
    });
  });
  allNodes=Object.values(nodes); allLinks=links;
  launchVR(missions.length);
}

function buildFromDetails(){
  var nodes={},links=[];
  Object.entries(UC_DETAILS).forEach(function(e){
    var ucr=e[0],det=e[1];
    var mid='m:'+ucr;
    if(!nodes[mid])nodes[mid]={id:mid,label:ucr,type:'mission',count:0};
    (det.focusTopics||[]).forEach(function(ft){
      var fid='ft:'+ft;
      if(!nodes[fid])nodes[fid]={id:fid,label:ft,type:'focus',count:0};
      nodes[fid].count++;links.push({source:mid,target:fid,rel:'focus'});
    });
  });
  allNodes=Object.values(nodes); allLinks=links;
  launchVR(allNodes.filter(function(n){return n.type==='mission';}).length);
}

// ── Filtered graph data ────────────────────────────────────────────────────────
function filteredData(){
  var keep=allNodes.filter(function(n){
    if(!vis[n.type]&&n.type!=='category')return false; // category always kept for layout
    if(n.type==='category'&&filterCat&&n.label!==filterCat)return false;
    return true;
  });
  if(filterCat){
    var catId='cat:'+filterCat, kept=new Set([catId]);
    allLinks.forEach(function(l){var s=l.source?.id||l.source,t=l.target?.id||l.target;if(t===catId)kept.add(s);});
    allLinks.forEach(function(l){var s=l.source?.id||l.source,t=l.target?.id||l.target;if(kept.has(s))kept.add(t);});
    keep=keep.filter(function(n){return kept.has(n.id);});
  }
  var nids=new Set(keep.map(function(n){return n.id;}));
  var klinks=allLinks.filter(function(l){
    var s=l.source?.id||l.source,t=l.target?.id||l.target;
    var relVis=l.rel==='service'?vis['service']:(l.rel==='category'?1:vis[l.rel]||0);
    return nids.has(s)&&nids.has(t)&&relVis;
  });
  return{nodes:keep.map(function(n){return Object.assign({},n);}),links:klinks};
}

// ── Launch ────────────────────────────────────────────────────────────────────
function launchVR(missionCount){
  document.getElementById('loading').style.display='none';
  var wrap=document.createElement('div');
  wrap.style.cssText='position:fixed;inset:0';
  document.body.appendChild(wrap);
  if(typeof ForceGraph3D==='undefined'){
    wrap.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#f87171;font-family:system-ui">3D engine not available — use localhost:8080</div>';
    return;
  }
  function nodeColor(n){
    if(n.type==='mission'){var sc={published:'#fde047','in progress':'#fef08a',draft:'#fef9c3',retired:'#94a3b8'};return sc[n.status||'']||'#fde047';}
    return KG_COLORS[n.type]||'#94a3b8';
  }
  function nodeSize(n){return n.type==='mission'?2:Math.min(8,2+Math.sqrt(n.count||0)*0.9);}

  var fd=filteredData();
  graphInst=ForceGraph3D({antialias:true,alpha:true})(wrap)
    .width(window.innerWidth).height(window.innerHeight)
    .backgroundColor('rgba(0,0,0,0)')
    .graphData(fd)
    .nodeColor(nodeColor).nodeVal(nodeSize).nodeResolution(8)
    .nodeLabel(function(n){return n.label+(n.count?' ('+n.count+')':'');})
    .linkColor(function(l){return KG_COLORS[l.rel]||'#334155';})
    .linkOpacity(0.15).linkWidth(0.3)
    .onNodeHover(function(n){wrap.style.cursor=n?'pointer':'default';});

  var cf=graphInst.d3Force('charge'),lf=graphInst.d3Force('link');
  if(cf&&cf.strength)cf.strength(function(n){return n.type==='category'?-120:n.type==='mission'?-15:-80;});
  if(lf&&lf.distance)lf.distance(function(l){return l.rel==='category'?80:l.rel==='focus'?60:50;});

  var renderer=graphInst.renderer();
  renderer.xr.enabled=true;
  var T=window.THREE;
  if(!T)return;

  // VR Button
  var btn=document.createElement('button');
  btn.textContent='Enter VR';
  btn.style.cssText='padding:12px 28px;border-radius:8px;border:2px solid #7c3aed;background:rgba(6,7,15,0.9);color:#e2e8f0;font-size:1rem;font-family:system-ui;cursor:pointer;font-weight:600';
  document.getElementById('vr-btn-wrap').appendChild(btn);
  btn.onclick=function(){
    navigator.xr&&navigator.xr.requestSession('immersive-vr',{optionalFeatures:['local-floor','bounded-floor']})
    .then(function(s){renderer.xr.setSession(s);btn.textContent='Exit VR';s.addEventListener('end',function(){btn.textContent='Enter VR';});});
  };

  var scene,camera,rig=new T.Group();
  rig.position.set(0,20,280);
  var exitPanel=null,controlPanel=null,hintPanel=null,catPanels=[],titlePanel=null;
  var rigReady=false;

  // ── Canvas panel helper ───────────────────────────────────────────────────
  function makeTextMesh(lines,opts){
    var W=opts.w||400,lh=opts.lh||36,pad=opts.pad||14;
    var H=opts.h||(lines.length*lh+pad*2);
    var cv=document.createElement('canvas');cv.width=W;cv.height=H;
    var ctx=cv.getContext('2d');
    ctx.fillStyle=opts.bg||'rgba(6,7,15,0.95)';
    if(ctx.roundRect){ctx.roundRect(0,0,W,H,12);ctx.fill();}else{ctx.fillRect(0,0,W,H);}
    ctx.strokeStyle=opts.border||'#7c3aed';ctx.lineWidth=2;
    if(ctx.roundRect){ctx.roundRect(1,1,W-2,H-2,11);ctx.stroke();}else{ctx.strokeRect(1,1,W-2,H-2);}
    lines.forEach(function(l,i){
      ctx.fillStyle=l.c||'#e2e8f0';
      ctx.font=(l.bold?'bold ':'')+((l.sz||20))+'px system-ui,sans-serif';
      ctx.textAlign=l.align||'center';
      ctx.fillText(l.t,l.align==='left'?16:W/2,pad+(l.sz||20)+i*lh,W-20);
    });
    var tex=new T.CanvasTexture(cv);
    var mat=new T.MeshBasicMaterial({map:tex,transparent:true,side:T.DoubleSide});
    var scale=opts.scale||0.08;
    return new T.Mesh(new T.PlaneGeometry(W*scale,H*scale),mat);
  }

  // ── Control panel (toggles + category filter) ─────────────────────────────
  function buildControlPanel(){
    if(controlPanel){scene.remove(controlPanel);}
    var cats=allNodes.filter(function(n){return n.type==='category';}).map(function(n){return n.label;}).sort();
    // Toggles row
    var toggleDefs=[
      {key:'mission',label:'Mission',color:'#fde047'},
      {key:'coach',label:'Coach',color:'#e879f9'},
      {key:'company',label:'Company',color:'#4ade80'},
      {key:'focus',label:'Focus',color:'#f97316'},
      {key:'service',label:'Services',color:'#60a5fa'},
      {key:'tag',label:'Tags',color:'#fbbf24'},
    ];
    var W=640,lh=38,pad=14;
    var H=pad*2+lh*(2+Math.min(cats.length,8)+1); // header+toggles+cats+divider
    var cv=document.createElement('canvas');cv.width=W;cv.height=H;
    var ctx=cv.getContext('2d');
    ctx.fillStyle='rgba(6,7,15,0.95)';
    if(ctx.roundRect){ctx.roundRect(0,0,W,H,14);ctx.fill();}else{ctx.fillRect(0,0,W,H);}
    ctx.strokeStyle='#7c3aed';ctx.lineWidth=2;
    if(ctx.roundRect){ctx.roundRect(1,1,W-2,H-2,13);ctx.stroke();}else{ctx.strokeRect(1,1,W-2,H-2);}
    // Title
    ctx.fillStyle='#a78bfa';ctx.font='bold 22px system-ui';ctx.textAlign='center';
    ctx.fillText('Node Filters',W/2,pad+20);
    // Toggles
    var tx=20,ty=pad+lh+16,colW=W/3;
    toggleDefs.forEach(function(td,i){
      var col=i%3,row=Math.floor(i/3);
      var x=tx+col*colW,y=ty+row*lh;
      var on=vis[td.key];
      // dot
      ctx.beginPath();ctx.arc(x+12,y+10,8,0,Math.PI*2);
      ctx.fillStyle=on?td.color:'#334155';ctx.fill();
      if(!on){ctx.strokeStyle='#475569';ctx.lineWidth=1.5;ctx.stroke();}
      // label
      ctx.fillStyle=on?td.color:'#64748b';ctx.font=(on?'bold ':'')+' 18px system-ui';ctx.textAlign='left';
      ctx.fillText(td.label,x+28,y+15);
    });
    // Divider
    var divY=ty+Math.ceil(toggleDefs.length/3)*lh+8;
    ctx.strokeStyle='#1e293b';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(16,divY);ctx.lineTo(W-16,divY);ctx.stroke();
    // Category filter label
    ctx.fillStyle='#64748b';ctx.font='16px system-ui';ctx.textAlign='left';
    ctx.fillText('Filter by Category:',16,divY+22);
    // Categories
    var cty=divY+lh;
    cats.slice(0,8).forEach(function(cat,i){
      var on=filterCat===cat;
      var col=i%2,row=Math.floor(i/2);
      var cx=20+col*(W/2),cy=cty+row*lh;
      ctx.beginPath();ctx.arc(cx+10,cy+10,7,0,Math.PI*2);
      ctx.fillStyle=on?'#60a5fa':'#1e293b';ctx.fill();
      ctx.strokeStyle=on?'#60a5fa':'#334155';ctx.lineWidth=1.5;ctx.stroke();
      ctx.fillStyle=on?'#e2e8f0':'#94a3b8';ctx.font=(on?'bold ':'')+' 16px system-ui';ctx.textAlign='left';
      ctx.fillText(cat.slice(0,28),cx+24,cy+14);
    });
    if(filterCat){
      var clearY=cty+Math.ceil(Math.min(cats.length,8)/2)*lh+4;
      ctx.fillStyle='#f87171';ctx.font='bold 17px system-ui';ctx.textAlign='center';
      ctx.fillText('✕ Clear filter',W/2,clearY+16);
    }
    var tex=new T.CanvasTexture(cv);
    var mat=new T.MeshBasicMaterial({map:tex,transparent:true,side:T.DoubleSide});
    var sc=0.1;
    var mesh=new T.Mesh(new T.PlaneGeometry(W*sc,H*sc),mat);
    // Store hitboxes metadata for raycasting
    mesh.userData.isControlPanel=true;
    mesh.userData.W=W;mesh.userData.H=H;
    mesh.userData.toggleDefs=toggleDefs;
    mesh.userData.cats=cats;
    mesh.userData.ty=ty;mesh.userData.lh=lh;mesh.userData.divY=divY;
    mesh.userData.cty=cty;mesh.userData.pad=pad;
    mesh.userData.scale=sc;
    return mesh;
  }

  function refreshGraph(){
    var fd=filteredData();
    if(graphInst)graphInst.graphData(fd);
    if(controlPanel&&scene){
      var pos=controlPanel.position.clone(),rot=controlPanel.quaternion.clone();
      var parent=controlPanel.parent;
      if(parent)parent.remove(controlPanel);
      controlPanel=buildControlPanel();
      controlPanel.position.copy(pos);
      controlPanel.quaternion.copy(rot);
      if(parent)parent.add(controlPanel);
    }
  }

  function handlePanelClick(panel, uv){
    // uv is 0-1 texture coords, convert to pixel coords
    var W=panel.userData.W, H=panel.userData.H, sc=panel.userData.scale;
    var px=uv.x*W, py=(1-uv.y)*H;
    var ty=panel.userData.ty, lh=panel.userData.lh;
    var divY=panel.userData.divY, cty=panel.userData.cty;
    var toggleDefs=panel.userData.toggleDefs, cats=panel.userData.cats;
    var colW=W/3, tx=20;
    // Check toggle hits
    toggleDefs.forEach(function(td,i){
      var col=i%3,row=Math.floor(i/3);
      var x=tx+col*colW, y=ty+row*lh;
      if(px>x&&px<x+colW&&py>y-8&&py<y+lh){
        vis[td.key]=vis[td.key]?0:1;
        refreshGraph();
      }
    });
    // Check category hits
    cats.slice(0,8).forEach(function(cat,i){
      var col=i%2,row=Math.floor(i/2);
      var cx=20+col*(W/2), cy=cty+row*lh;
      if(px>cx&&px<cx+W/2&&py>cy-4&&py<cy+lh){
        filterCat=filterCat===cat?'':cat;
        refreshGraph();
      }
    });
    // Clear button
    if(filterCat){
      var clearY=cty+Math.ceil(Math.min(cats.length,8)/2)*lh+4;
      if(py>clearY&&py<clearY+lh){filterCat='';refreshGraph();}
    }
  }

  // ── Init scene ────────────────────────────────────────────────────────────
  function initRig(){
    var s=graphInst.scene&&graphInst.scene();
    var c=graphInst.camera&&graphInst.camera();
    if(!s||!c||rigReady)return;
    rigReady=true;scene=s;camera=c;
    s.add(rig);rig.add(c);
    c.far=50000;c.updateProjectionMatrix();
    s.add(new T.AmbientLight(0xffffff,1.2));
    s.add(new T.Mesh(new T.SphereGeometry(2000,16,16),new T.MeshBasicMaterial({color:0x02040f,side:T.BackSide})));
    addRocket(s);

    // Title panel
    var mc=allNodes.filter(function(n){return n.type==='mission';}).length;
    var sc2=allNodes.filter(function(n){return n.type==='service'||n.type==='svcpartner'||n.type==='svcopt';}).length;
    titlePanel=makeTextMesh([
      {t:'Missions Knowledge Graph',c:'#a78bfa',bold:true,sz:24},
      {t:mc+' missions · '+sc2+' services · '+allLinks.length+' links',c:'#64748b',sz:18}
    ],{w:560,lh:36,border:'#7c3aed',scale:0.1});
    titlePanel.position.set(0,145,0);s.add(titlePanel);

    // Control panel (attached to rig, always visible)
    controlPanel=buildControlPanel();
    controlPanel.position.set(-55,5,-45); // left side
    rig.add(controlPanel);

    // Exit panel
    exitPanel=makeTextMesh([{t:'✕  EXIT VR',c:'#f87171',bold:true,sz:24},{t:'Aim + trigger',c:'#64748b',sz:17}],{w:240,h:90,border:'#f87171',scale:0.09});
    exitPanel.position.set(28,-6,-45);rig.add(exitPanel);

    // Hint panel
    hintPanel=makeTextMesh([
      {t:'VR Controls',c:'#fde047',bold:true,sz:22},
      {t:'Left stick → move/strafe',c:'#e2e8f0',sz:18},
      {t:'Right stick → turn',c:'#e2e8f0',sz:18},
      {t:'Trigger on panel → toggle/filter',c:'#86efac',sz:18},
      {t:'Trigger on EXIT → leave VR',c:'#94a3b8',sz:16},
    ],{w:480,lh:34,border:'#fde047',scale:0.09});
    hintPanel.position.set(0,45,160);s.add(hintPanel);
    setTimeout(function(){if(hintPanel)hintPanel.visible=false;},10000);

    setupControllers(s);
  }

  var initIv=setInterval(function(){if(graphInst.scene&&graphInst.scene()){initRig();clearInterval(initIv);}},200);

  // ── Rocket ────────────────────────────────────────────────────────────────
  function addRocket(s){
    var M=T.MeshBasicMaterial,rk=new T.Group();
    rk.add(new T.Mesh(new T.CapsuleGeometry(2.5,9,8,16),new M({color:0xbcc8d4})));
    var nose=new T.Mesh(new T.ConeGeometry(2.5,5,16),new M({color:0x1d4ed8}));
    nose.position.y=9.5;rk.add(nose);
    for(var i=0;i<3;i++){var pv=new T.Group();pv.rotation.y=(i/3)*Math.PI*2;var fin=new T.Mesh(new T.BoxGeometry(1,5,3.5),new M({color:0x3b82f6}));fin.position.set(3.5,-7,0);pv.add(fin);rk.add(pv);}
    var fm=new M({color:0xf97316,transparent:true,opacity:0.9});
    var flame=new T.Mesh(new T.ConeGeometry(1.8,5,10),fm);
    flame.position.y=-9.5;flame.rotation.z=Math.PI;rk.add(flame);
    rk.rotation.x=-Math.PI/2;
    var orbit=new T.Group();orbit.rotation.x=0.4;orbit.rotation.z=0.3;
    rk.position.set(220,0,0);orbit.add(rk);s.add(orbit);
    var tick=0;(function a(){requestAnimationFrame(a);orbit.rotation.y+=0.006;fm.opacity=0.7+0.2*Math.sin(tick+=0.12);})();
  }

  // ── Controllers ───────────────────────────────────────────────────────────
  var rc=new T.Raycaster();rc.far=500;
  var wp=new T.Vector3(),wq=new T.Quaternion(),rd=new T.Vector3();
  function setupControllers(s){
    [0,1].forEach(function(i){
      var c=renderer.xr.getController(i);rig.add(c);
      var rl=new T.Line(new T.BufferGeometry().setFromPoints([new T.Vector3(0,0,0),new T.Vector3(0,0,-1)]),new T.LineBasicMaterial({color:i===0?0x60a5fa:0xf87171}));
      rl.scale.z=60;c.add(rl);
      c.addEventListener('selectstart',function(){
        c.getWorldPosition(wp);c.getWorldQuaternion(wq);rd.set(0,0,-1).applyQuaternion(wq);rc.set(wp,rd);
        // Exit panel
        if(exitPanel){var eh=rc.intersectObject(exitPanel,true);if(eh.length>0){renderer.xr.getSession()?.end();return;}}
        // Control panel
        if(controlPanel){
          var ch=rc.intersectObject(controlPanel,true);
          if(ch.length>0){
            var uv=ch[0].uv;
            if(uv)handlePanelClick(controlPanel,uv);
          }
        }
      });
    });
  }

  // ── Render loop ───────────────────────────────────────────────────────────
  var fwd=new T.Vector3(),rgt=new T.Vector3();
  renderer.setAnimationLoop(function(time,frame){
    if(!rigReady||!camera)return;
    camera.getWorldDirection(fwd);fwd.y=0;fwd.normalize();
    rgt.crossVectors(new T.Vector3(0,1,0),fwd).negate();
    if(frame){
      var sess=renderer.xr.getSession();
      var srcs=sess?[...sess.inputSources]:[];
      srcs.forEach(function(src){
        if(!src.gamepad)return;
        var axes=src.gamepad.axes;if(axes.length<4)return;
        if(src.handedness==='left'){
          var lx=Math.abs(axes[2])>DEADZONE?axes[2]:0;
          var ly=Math.abs(axes[3])>DEADZONE?axes[3]:0;
          if(lx||ly){rig.position.addScaledVector(fwd,-ly*MOVE_SPEED);rig.position.addScaledVector(rgt,lx*MOVE_SPEED);}
        }
        if(src.handedness==='right'){
          var rx=Math.abs(axes[2])>DEADZONE?axes[2]:0;
          var ry=Math.abs(axes[3])>DEADZONE?axes[3]:0;
          if(rx)rig.rotateY(-rx*TURN_SPEED);
          if(ry)rig.position.y-=ry*MOVE_SPEED*0.5;
        }
      });
      // Face panels toward camera
      var cp=new T.Vector3();camera.getWorldPosition(cp);
      [exitPanel,hintPanel,titlePanel].forEach(function(p){if(p&&p.visible)p.lookAt(cp);});
    }
    renderer.render(scene||graphInst.scene(),camera);
  });
  window.addEventListener('resize',function(){if(graphInst)graphInst.width(window.innerWidth).height(window.innerHeight);});
}
</script>
</body>
</html>
